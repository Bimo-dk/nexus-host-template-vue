<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Host (Vue)</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      #app { height: 100%; }

      :root {
        --host-surface: #ffffff;
        --host-border: #e2e8f0;
        --host-text: #1e293b;
        --host-text-muted: #64748b;
        --host-primary: #6366f1;
        --host-primary-dark: #4f46e5;
        --health-healthy: #16a34a;
        --health-degraded: #f59e0b;
        --health-down: #dc2626;
        --health-unknown: #94a3b8;
      }
    </style>
    <!--
      es-module-shims so native-federation's late-injected import map
      is honoured by the browser. Without it the dynamic chunks emitted
      by Angular remotes (with shareAll() of @angular/core etc.) hit
      "Failed to resolve module specifier" the moment they import a
      shared bare name. shimMode keeps it out of the way of plain
      first-party module loads. (B-22)
    -->
    <script type="esms-options">{ "shimMode": true, "polyfillEnable": ["css-modules", "json-modules"] }</script>
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
